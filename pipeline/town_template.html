<!-- town_template.html — Civica design system (colors, fonts, cards, score ring,
     dimension bars). town_generator.py reads the <style> block below. -->
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  /* Civica Clean tokens (white + blue) */
  --blue:    #0d2d52;   /* ink / navy */
  --blue-lt: #1a7ff0;   /* primary accent */
  --navy:    #0d2d52;
  --green:   #16a34a;
  --yellow:  #b45309;
  --red:     #dc2626;
  --purple:  #0b57c2;   /* remapped to AA blue (no purple in palette) */
  --bg:      #ffffff;
  --card:    #ffffff;
  --border:  #e6e8ee;
  --muted:   #5b6170;
  --text:    #111827;
  --subtext: #5b6170;
  --shadow-sm: 0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
  --shadow:    0 4px 16px rgba(0,0,0,.08), 0 1px 4px rgba(0,0,0,.04);
  --shadow-lg: 0 12px 40px rgba(0,0,0,.12), 0 4px 12px rgba(0,0,0,.06);
  --r:    16px;
  --r-sm: 10px;
  --r-xs:  6px;
}

body { font-family: 'Roboto', -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; background: var(--bg); color: var(--text); }
h1, h2, h3, .acc-title, .sh-num, .sb-val, .gt-val { font-family: 'Poppins', sans-serif; letter-spacing:-.01em; }
.num, .mono, .dv, .gt-tag, .posbar .pl, code { font-family: 'Inconsolata', ui-monospace, monospace; }

/* NAV */
.nav { background:rgba(255,255,255,.88); backdrop-filter:saturate(180%) blur(20px); -webkit-backdrop-filter:saturate(180%) blur(20px); border-bottom:1px solid var(--border); height:56px; padding:0 28px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:200; }
.logo { display:flex; align-items:center; gap:9px; text-decoration:none; }
.logo-text { font-size:17px; font-weight:800; color:#0d2d52; letter-spacing:-.3px; }
.logo-text em { font-style:normal; color:#1a7ff0; }
.nav-right { display:flex; align-items:center; gap:16px; }
.nav-tag { font-size:11px; font-weight:700; background:#f5f5f7; color:var(--subtext); padding:4px 10px; border-radius:100px; letter-spacing:.04em; border:1px solid var(--border); }
.nav-back { font-size:13px; color:#1a7ff0; text-decoration:none; font-weight:500; }

/* HERO */
.hero { background:linear-gradient(150deg,#0a2440 0%,#0d2d52 100%); color:#fff; padding:30px 34px; border-radius:var(--r);
  display:flex; align-items:center; justify-content:space-between; gap:32px; flex-wrap:wrap; box-shadow:var(--shadow); }
.hero-id { flex:1 1 280px; min-width:0; }
.hero-score { display:flex; align-items:center; gap:26px; flex-wrap:wrap; }
.hero-eyebrow { font-size:11px; font-weight:700; letter-spacing:.12em; color:rgba(255,255,255,.45); text-transform:uppercase; margin-bottom:10px; }
.hero h1 { font-size:30px; font-weight:800; line-height:1.1; letter-spacing:-.4px; }
.hero-sub { font-size:14px; color:rgba(255,255,255,.62); margin-top:6px; }

/* VERDICT BADGE */
.verdict-badge { display:flex; flex-direction:column; align-items:flex-start; gap:6px; }
.vb-label { font-size:10px; color:rgba(255,255,255,.4); text-transform:uppercase; letter-spacing:.08em; }
.vb-pill { font-size:13px; font-weight:800; padding:8px 18px; border-radius:100px; }
.vb-accelerating { background:#16a34a; color:#fff; }
.vb-peaking      { background:#22c55e; color:#fff; }
.vb-established  { background:#0b57c2; color:#fff; }
.vb-emerging     { background:#8b5cf6; color:#fff; }
.vb-frontier     { background:#f59e0b; color:#fff; }
.vb-turning      { background:#dc2626; color:#fff; }
.vb-speculative  { background:#ef4444; color:#fff; }
.vb-avoid        { background:#dc2626; color:#fff; }
.vb-score { font-size:11px; color:rgba(255,255,255,.55); text-align:left; margin-top:2px; }

/* SCORE RING */
.score-hero { display:flex; flex-direction:column; align-items:center; }
.sh-ring { width:110px; height:110px; position:relative; display:flex; align-items:center; justify-content:center; flex-direction:column; }
.sh-ring svg { position:absolute; top:0; left:0; width:100%; height:100%; transform:rotate(-90deg); }
.sh-num   { font-size:34px; font-weight:900; line-height:1; color:#fff; position:relative; z-index:1; }
.sh-denom { font-size:13px; color:rgba(255,255,255,.4); position:relative; z-index:1; }
.sh-grade { margin-top:5px; font-size:12px; font-weight:700; color:#4ade80; }

/* HERO STATS STRIP — 6 pills, 3-col grid on mobile */
.hero-pills { display:flex; border-top:1px solid rgba(255,255,255,.1); background:rgba(0,0,0,.2); margin-top:24px; }
.hero-pill { flex:1; padding:13px 18px; border-right:1px solid rgba(255,255,255,.08); display:flex; flex-direction:column; gap:3px; min-width:108px; }
.hero-pill:last-child { border-right:none; }
.hp-lbl { font-size:9px; color:rgba(255,255,255,.45); text-transform:uppercase; letter-spacing:.06em; font-weight:600; }
.hp-val { font-size:13px; font-weight:700; }
.hp-green  { color:#4ade80; }
.hp-yellow { color:#fbbf24; }
.hp-red    { color:#f87171; }
.hp-white  { color:#fff; }
.hp-purple { color:#c4b5fd; }

@media(max-width:640px){
  /* ── NAV ── */
  .nav { padding:0 14px; }
  .nav-tag { display:none; }
  .nav-back { font-size:12px; }

  /* ── HERO ── */
  .hero { padding:22px 20px; gap:18px; }
  .hero-eyebrow { font-size:10px; margin-bottom:6px; }
  .hero h1 { font-size:23px; letter-spacing:-.3px; }
  .hero-sub { font-size:12px; margin-top:4px; }
  .hero-score { gap:16px; }
  .sh-ring { width:80px; height:80px; }
  .sh-num  { font-size:26px; }
  .sh-denom{ font-size:11px; }
  .sh-grade{ font-size:10px; margin-top:3px; }
  .vb-label{ font-size:9px; }
  .vb-pill { font-size:12px; padding:6px 14px; }
  .vb-score{ font-size:10px; }

  /* ── HERO PILLS — 3×2 grid ── */
  .hero-pills { display:grid; grid-template-columns:repeat(3,1fr); }
  .hero-pill { min-width:unset; flex:unset; border-right:none; border-bottom:1px solid rgba(255,255,255,.08); padding:11px 12px; }
  .hero-pill:nth-child(4),.hero-pill:nth-child(5),.hero-pill:nth-child(6) { border-bottom:none; }
  .hero-pill:nth-child(1),.hero-pill:nth-child(2),
  .hero-pill:nth-child(4),.hero-pill:nth-child(5) { border-right:1px solid rgba(255,255,255,.08); }
  .hp-lbl { font-size:8px; letter-spacing:.04em; }
  .hp-val { font-size:12px; }

  /* ── PAGE + ACCORDION ── */
  .page { padding:14px 12px; gap:12px; }
  .acc-section { border-radius:var(--r-sm); }
  .acc-header { padding:14px 16px; }
  .acc-title { font-size:13px; }
  .acc-icon { font-size:16px; }
  .acc-content { padding:14px; gap:14px; }

  /* ── CARDS ── */
  .card { padding:16px; }
  .card-title { font-size:10px; margin-bottom:12px; }
  .card-intro { font-size:12px; margin-bottom:12px; }

  /* ── SCORE BANNER (thesis): hide redundant ring, stack vertically ── */
  .score-banner { flex-direction:column; gap:12px; padding:16px; }
  .score-banner > div:first-child { display:none; } /* ring already in hero */
  .score-banner h3 { font-size:14px; line-height:1.4; }
  .score-banner p  { font-size:12px; line-height:1.55; }
  .sbb-items { display:grid; grid-template-columns:repeat(3,1fr); gap:6px; margin-top:10px; }
  .sbb-item  { min-width:unset; padding:8px; }
  .sbb-name  { font-size:8px; }
  .sbb-val   { font-size:13px; }
  .sbb-wt    { font-size:9px; }

  /* ── GRIDS ── */
  .g2 { grid-template-columns:1fr; gap:12px; }
  .g3 { grid-template-columns:1fr 1fr; gap:12px; }
  .g4 { grid-template-columns:1fr 1fr; gap:10px; }

  /* ── STAT BOXES ── */
  .sb { padding:12px; }
  .sb-val { font-size:20px; }
  .sb-lbl { font-size:10px; margin-top:3px; }
  .sb-delta { font-size:11px; margin-top:3px; }

  /* ── SIGNALS ── */
  .signal { padding:11px 13px; gap:10px; }
  .signal .icon { font-size:17px; }
  .signal .body { font-size:12px; line-height:1.5; }

  /* ── VALUATION METERS ── */
  .meter-row { flex-wrap:wrap; gap:6px 14px; padding:10px 0; }
  .meter-lbl { width:100%; margin-bottom:2px; font-size:12px; }
  .meter-val { font-size:12px; width:56px; }

  /* ── SCENARIO GRID ── */
  .scenario-grid { grid-template-columns:1fr; gap:10px; }

  /* ── BAR CHART ── */
  .bar-lbl { width:80px; font-size:11px; }
  .bar-val { font-size:11px; }

  /* ── RISK MATRIX ── */
  .risk-matrix { grid-template-columns:1fr 1fr; gap:8px; }
  .rm-card { padding:12px; }
  .rm-name { font-size:11px; }
  .rm-impact { font-size:11px; }

  /* ── COMP TABLE ── */
  .comp-table { font-size:11px; }
  .comp-table td, .comp-table th { padding:7px 5px; }

  /* ── CTA + FOOTER ── */
  .cta { font-size:13px; padding:11px; min-width:unset; }
  .footer { font-size:10px; padding:20px 14px 48px; line-height:1.6; }
}

/* PAGE */
.page { max-width:960px; margin:0 auto; padding:28px 20px; display:flex; flex-direction:column; gap:16px; }

/* CARD */
.card { background:var(--card); border-radius:var(--r-sm); padding:24px; border:1px solid var(--border); }
.card-title { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.08em; color:var(--muted); margin-bottom:18px; display:flex; align-items:center; gap:7px; }
.card-title .ct-icon { font-size:16px; }
.card-intro { font-size:14px; color:var(--subtext); line-height:1.65; margin-bottom:18px; }

/* ACCORDION */
.acc-section { background:var(--card); border-radius:var(--r); box-shadow:var(--shadow); border:1px solid var(--border); overflow:hidden; }
.acc-header { display:flex; align-items:center; justify-content:space-between; padding:18px 24px; cursor:pointer; user-select:none; transition:background .15s; }
.acc-header:hover { background:#fafafa; }
.acc-title { font-size:15px; font-weight:700; color:var(--navy); display:flex; align-items:center; gap:10px; }
.acc-icon { font-size:20px; }
.acc-chevron { color:var(--muted); transition:transform .25s; font-size:20px; line-height:1; }
.acc-section.open .acc-chevron { transform:rotate(180deg); }
.acc-body { display:grid; grid-template-rows:0fr; transition:grid-template-rows .28s ease; }
.acc-section.open .acc-body { grid-template-rows:1fr; }
.acc-inner { overflow:hidden; }
.acc-content { border-top:1px solid var(--border); padding:24px; display:flex; flex-direction:column; gap:20px; }

/* GRIDS */
.g2 { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
.g3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:16px; }
.numwrap { column-count:2; column-gap:36px; }
.numsec { break-inside:avoid; margin-bottom:18px; }
.numsec-h { font-size:12px; font-weight:700; color:var(--navy); margin-bottom:2px; display:flex; align-items:center; gap:6px; }
.numrow { display:flex; justify-content:space-between; align-items:baseline; gap:12px; padding:9px 0; border-bottom:1px solid var(--border); }
.numsec .numrow:last-child { border-bottom:none; }
.nl { font-size:13.5px; color:var(--text); }
.nl i { font-style:normal; color:var(--muted); font-size:11.5px; margin-left:4px; }
.nv { font-family:'Inconsolata'; font-weight:700; font-size:15px; color:var(--navy); white-space:nowrap; }
.nv .imp { font-family:'Roboto'; font-weight:600; font-size:10px; color:var(--muted); margin-left:5px; }
@media(max-width:560px){ .numwrap { column-count:1; } }
.g4 { display:grid; grid-template-columns:1fr 1fr 1fr 1fr; gap:16px; }
@media(max-width:400px) { .g2,.g3,.g4 { grid-template-columns:1fr; } }

/* STAT BOX */
.sb { background:#f6f9fd; border-radius:var(--r-sm); padding:14px 14px 16px; border:1px solid var(--border); }
.sb-val { font-size:24px; font-weight:800; color:var(--navy); line-height:1; }
.sb-val.big { font-size:32px; }
.sb-lbl { font-size:11px; color:var(--muted); margin-top:4px; font-weight:500; line-height:1.3; }
.sb-delta { font-size:12px; font-weight:600; margin-top:5px; }
.up     { color:var(--green); }
.down   { color:var(--red); }
.flat   { color:var(--yellow); }
.purple { color:var(--purple); }

/* SIGNALS */
.signal { border-radius:var(--r-sm); padding:14px 16px; display:flex; gap:12px; align-items:flex-start; }
.prof-standout { padding:12px 16px; background:#f0f6ff; border-radius:var(--r-sm); font-size:.82rem; line-height:1.6; color:#1d4ed8; border:1px solid rgba(13,45,82,.12); margin-top:14px; }
.sig-green  { background:#f0fdf4; border:1px solid #bbf7d0; }
.sig-yellow { background:#fffbeb; border:1px solid #fde68a; }
.sig-red    { background:#fef2f2; border:1px solid #fecaca; }
.sig-blue   { background:#eff6ff; border:1px solid #bfdbfe; }
.sig-purple { background:#f5f3ff; border:1px solid #ddd6fe; }
.signal .icon { font-size:20px; flex-shrink:0; margin-top:1px; }
.signal .body { font-size:13px; line-height:1.55; }
.sig-green  .body { color:#14532d; }
.sig-yellow .body { color:#78350f; }
.sig-red    .body { color:#7f1d1d; }
.sig-blue   .body { color:#1e3a5f; }
.sig-purple .body { color:#4c1d95; }

/* SCORE BANNER */
.score-banner { background:linear-gradient(135deg,#091f3a 0%,#060f1e 100%); border-radius:var(--r); padding:24px; color:#fff; display:flex; gap:24px; align-items:center; flex-wrap:wrap; box-shadow:var(--shadow-lg); }
.score-banner h3 { font-size:17px; font-weight:800; margin-bottom:6px; }
.score-banner p  { font-size:13px; color:rgba(255,255,255,.65); line-height:1.6; max-width:480px; }
.sbb-items { display:flex; gap:8px; flex-wrap:wrap; margin-top:14px; }
.sbb-item  { background:rgba(255,255,255,.1); border-radius:8px; padding:8px 12px; min-width:90px; }
.sbb-name  { font-size:10px; color:rgba(255,255,255,.45); text-transform:uppercase; letter-spacing:.06em; }
.sbb-val   { font-size:15px; font-weight:800; color:#fff; margin-top:2px; }
.sbb-wt    { font-size:10px; color:rgba(255,255,255,.35); }

/* VALUATION METER */
.meter-row { display:flex; align-items:center; gap:14px; padding:12px 0; border-bottom:1px solid #f3f4f6; flex-wrap:wrap; }
.meter-row:last-child { border-bottom:none; }
.meter-lbl { font-size:13px; font-weight:600; color:var(--navy); width:160px; flex-shrink:0; }
.meter-track { flex:1; min-width:120px; background:#f1f5f9; border-radius:100px; height:8px; position:relative; }
.meter-fill  { height:100%; border-radius:100px; }
.meter-marker { position:absolute; top:-4px; width:2px; height:16px; background:var(--subtext); border-radius:1px; }
.meter-vals { display:flex; justify-content:space-between; font-size:10px; color:var(--muted); margin-top:3px; }
.meter-val  { font-size:13px; font-weight:700; width:70px; text-align:right; }

/* SCENARIO TABLE */
.scenario-grid { display:grid; grid-template-columns:1fr 1fr 1fr; gap:12px; }
.scenario-card { border-radius:var(--r-sm); padding:18px; }
.sc-bull { background:#f0fdf4; border:2px solid #bbf7d0; }
.sc-base { background:#eff6ff; border:2px solid #bfdbfe; }
.sc-bear { background:#fef2f2; border:2px solid #fecaca; }
.sc-label { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.07em; margin-bottom:8px; }
.sc-bull .sc-label { color:#15803d; }
.sc-base .sc-label { color:#1d4ed8; }
.sc-bear .sc-label { color:#b91c1c; }
.sc-prob  { font-size:11px; color:var(--muted); margin-bottom:12px; }
.sc-val   { font-size:24px; font-weight:900; margin-bottom:2px; }
.sc-bull .sc-val { color:#15803d; }
.sc-base .sc-val { color:#1d4ed8; }
.sc-bear .sc-val { color:#b91c1c; }
.sc-rate  { font-size:13px; font-weight:600; margin-bottom:10px; }
.sc-trigger { font-size:12px; color:var(--subtext); line-height:1.5; }

/* BAR CHART */
.bar-chart { display:flex; flex-direction:column; gap:10px; }
.bar-row   { display:flex; align-items:center; gap:10px; }
.bar-lbl   { font-size:12px; color:var(--subtext); width:140px; flex-shrink:0; text-align:right; }
.bar-track { flex:1; background:#f1f5f9; border-radius:4px; height:10px; }
.bar-fill  { height:100%; border-radius:4px; }
.bar-val   { font-size:12px; font-weight:600; color:var(--text); width:60px; }

/* RISK MATRIX */
.risk-matrix { display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; }
.rm-card { background:#f5f5f7; border-radius:var(--r-sm); padding:14px; border:1px solid var(--border); }
.rm-icon { font-size:20px; margin-bottom:6px; }
.rm-name { font-size:12px; font-weight:700; color:var(--navy); }
.rm-prob { font-size:11px; color:var(--muted); margin-top:2px; }
.rm-impact { font-size:12px; font-weight:600; margin-top:4px; }
.impact-low  { color:var(--green); }
.impact-med  { color:var(--yellow); }
.impact-high { color:var(--red); }

/* COMP TABLE */
.comp-table { width:100%; border-collapse:collapse; font-size:13px; }
.comp-table th { text-align:left; font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.06em; color:var(--muted); padding:0 10px 10px; border-bottom:1px solid var(--border); }
.comp-table th:not(:first-child) { text-align:center; }
.comp-table td { padding:9px 10px; border-top:1px solid #f3f4f6; }
.comp-table td:not(:first-child) { text-align:center; font-weight:600; }
.comp-table .hl td { background:#eff6ff; }
.comp-table .hl .cn { font-weight:700; color:var(--blue); }
.cn { font-weight:500; }
.tag { font-size:10px; font-weight:700; padding:2px 8px; border-radius:100px; }
.tag-g { background:#dcfce7; color:#15803d; }
.tag-y { background:#fef3c7; color:#92400e; }
.tag-r { background:#fee2e2; color:#b91c1c; }

/* SPARKLINE */
.spark-wrap { position:relative; height:72px; }
.spark-wrap svg { width:100%; height:100%; }
.spark-lbl { display:flex; justify-content:space-between; font-size:10px; color:var(--muted); margin-top:3px; }

/* CTA */
.cta-strip { display:flex; gap:12px; flex-wrap:wrap; }
.cta { flex:1; min-width:150px; border:none; border-radius:10px; padding:13px; font-size:14px; font-weight:700; cursor:pointer; text-align:center; }
.cta-p { background:var(--blue); color:#fff; }
.cta-p:hover { background:#1568cc; }
.cta-s { background:var(--card); color:var(--navy); border:1.5px solid var(--border); }
.cta-s:hover { background:#f8fafc; }

/* FOOTER */
.footer { text-align:center; font-size:11px; color:var(--muted); padding:32px 24px 64px; line-height:1.8; }

/* COMP TABLE signal pill */
.lb-sbuy  { background:#16a34a; color:#fff; }
.lb-buy   { background:#1a7ff0; color:#fff; }
.lb-watch { background:#f59e0b; color:#fff; }
.lb-caut  { background:#dc2626; color:#fff; }
.lb-avoid { background:#dc2626; color:#fff; }
</style>
